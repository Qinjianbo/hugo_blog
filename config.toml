baseURL = "https://www.boboidea.com/"
languageCode = "zh-Hans"
defaultContentLanguage = "zh"
title = "BoBo`s Blog"
theme = "PaperMod"
hasCJKLanguage = true
enableRobotsTXT = false
pygmentsUseClasses = true
googleAnalytics = "G-839GW747XX"

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[languages]
  [languages.zh]
    languageName = "简体中文"
    weight = 1
    languageCode = "zh-Hans"
    contentDir = "content"
    title = "BoBo`s Blog"

  [languages.en]
    languageName = "English"
    weight = 2
    languageCode = "en"
    contentDir = "content/en"
    title = "BoBo's Blog"
    [languages.en.params]
      description = "BoBo's Blog – tech notes and tutorials"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "gruvbox"

[params]
  env = "production"
  author = "huba"
  description = "胡巴的博客空间"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  comments = true
  mainSections = ["posts"]
  images = ["/img/avatar.jpeg"]
  siteStartYear = 2017

  [params.assets]
    favicon = "/favicon.ico"
    disableHLJS = true

  [params.cover]
    hiddenInList = true
    hiddenInSingle = false

  [params.ads]
    client = "ca-pub-9980006545865573"

  [params.homeBanner]
    image = "/img/banner.webp"                         # 静态目录下的横幅图片路径，如 /img/banner.jpg
    url = "https://subsub.cn/i/BAZVCP6VTW"                           # 点击跳转链接
    alt = "促销广告"                     # 图片替代文本
    newTab = true                      # 是否新开标签页

  [params.homeInfoParams]
    Title = "BoBo`s Blog"
    Content = "每天进步一点点，能多一点是一点"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.3
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]

  [params.footer]
    text = "<a href=\"https://beian.miit.gov.cn/\" target=\"_blank\">辽ICP备16004582号-1</a>"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Qinjianbo"

  [[params.socialIcons]]
    name = "KoFi"
    url = "https://ko-fi.com/huba"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:qinjianbo521@gmail.com"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 2

  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 3

  [[menu.main]]
    name = "搜索"
    url = "/search/"
    weight = 4

  [[menu.main]]
    name = "关于"
    url = "/about/me/"
    weight = 5

[languages.en.menu]
  [[languages.en.menu.main]]
    name = "Home"
    url = "/en/"
    weight = 1

  [[languages.en.menu.main]]
    name = "Archives"
    url = "/en/archives/"
    weight = 2

  [[languages.en.menu.main]]
    name = "Tags"
    url = "/en/tags/"
    weight = 3

  [[languages.en.menu.main]]
    name = "Search"
    url = "/en/search/"
    weight = 4

  [[languages.en.menu.main]]
    name = "About"
    url = "/en/about/"
    weight = 5

# Custom scripts
[params.advanced]
  customJS = ["js/bd_push.js"]

# Comment service: Valine
[params.valine]
  enable = true
  placeholder = "留言交流~"
  avatar = "mp"
  recordIP = true

[params.leancloud]
  appId = "tBxtGLtTerNO4L5lf9vuKztP-gzGzoHsz"
  appKey = "OQgHycWy8d5Cv8OkLL0YildP"
